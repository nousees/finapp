upstream auth_service {
    server auth:8082;
}

upstream collection_service {
    server collection:8080;
}

upstream processing_service {
    server processing:8081;
}

upstream subscription_service {
    server subscription-detector:8083;
}

upstream analysis_service {
    server analysis-control:8084;
}

upstream ml_service {
    server ml-service:8000;
}

server {
    listen 8080;
    server_name localhost;

    # CORS headers
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

    # Handle preflight requests
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "FinApp Gateway is healthy\n";
        add_header Content-Type text/plain;
    }

    # Auth service routes. The Go auth service exposes /sign-in, /sign-up and /refresh.
    location = /api/v1/auth/signin {
        proxy_pass http://auth_service/sign-in;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/auth/signup {
        proxy_pass http://auth_service/sign-up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/auth/refresh {
        proxy_pass http://auth_service/refresh;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Collection service routes (transactions, imports, voice)
    location ~ ^/api/v1/(transactions|import|imports|voice) {
        proxy_pass http://collection_service$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Processing service routes (ML categorization)
    location ~ ^/api/v1/(process|categorize) {
        proxy_pass http://processing_service$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Subscription detector routes
    location ~ ^/api/v1/(subscriptions|analyze-subscriptions) {
        proxy_pass http://subscription_service$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Analysis and control service routes (budgets, goals, reports, notifications, insights)
    location ~ ^/api/v1/(budgets|goals|reports|notifications|dashboard|recommendations|insights) {
        proxy_pass http://analysis_service$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ML service routes
    location ~ ^/api/v1/ml/(transcribe|extract|predict) {
        proxy_pass http://ml_service$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Default fallback
    location / {
        return 404 "Not Found - FinApp Gateway";
        add_header Content-Type text/plain;
    }
}
