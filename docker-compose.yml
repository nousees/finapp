services:
  postgres:
    image: postgres:16-alpine
    container_name: finapp-postgres
    environment:
      POSTGRES_USER: finapp
      POSTGRES_PASSWORD: finapp
      POSTGRES_DB: finapp
    ports:
      - "5432:5432"
    volumes:
      - finapp_pgdata:/var/lib/postgresql/data
      - ./infrastructure/init-collection.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finapp -d finapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  mobile:
    build:
      context: ./apps/mobile
      dockerfile: Dockerfile
    container_name: finapp-mobile
    working_dir: /app
    volumes:
      - ./apps/mobile:/app
      - /app/node_modules
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    depends_on:
      - postgres

volumes:
  finapp_pgdata:
