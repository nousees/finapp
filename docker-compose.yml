services:
  postgres:
    image: postgres:16-alpine
    container_name: finapp-postgres
    environment:
      POSTGRES_USER: finapp
      POSTGRES_PASSWORD: finapp
      POSTGRES_DB: finapp
    ports:
      - "5432:5432"
    volumes:
      - finapp_pgdata:/var/lib/postgresql/data
      - ./infrastructure/init-collection.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finapp -d finapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  collection:
    build:
      context: ./services/data-processing/collection
      dockerfile: Dockerfile
    container_name: finapp-collection
    environment:
      PORT: "8080"
      DATABASE_DSN: postgres://finapp:finapp@postgres:5432/finapp?sslmode=disable
      JWT_SECRET: finapp-dev-secret
      ML_SERVICE_URL: http://host.docker.internal:8000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  processing:
    build:
      context: ./services/data-processing/processing
      dockerfile: Dockerfile
    container_name: finapp-processing
    environment:
      PORT: "8081"
      DATABASE_DSN: postgres://finapp:finapp@postgres:5432/finapp?sslmode=disable
      JWT_SECRET: finapp-dev-secret
    ports:
      - "8083:8081"
    depends_on:
      postgres:
        condition: service_healthy

  subscription-detector:
    build:
      context: ./services/data-processing/subscription-detector
      dockerfile: Dockerfile
    container_name: finapp-subscription-detector
    environment:
      PORT: "8082"
      DATABASE_DSN: postgres://finapp:finapp@postgres:5432/finapp?sslmode=disable
      JWT_SECRET: finapp-dev-secret
    ports:
      - "8084:8082"
    depends_on:
      postgres:
        condition: service_healthy

  mobile:
    build:
      context: ./apps/mobile
      dockerfile: Dockerfile
    container_name: finapp-mobile
    working_dir: /app
    volumes:
      - ./apps/mobile:/app
      - /app/node_modules
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    depends_on:
      - postgres
      - collection
      - processing
      - subscription-detector

volumes:
  finapp_pgdata:
